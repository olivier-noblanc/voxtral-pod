repos:
  - repo: local
    hooks:
      - id: check-dom-contract
        name: Verify DOM contract between JS and HTML
        entry: scripts/check_dom_contract.py
        language: python
        files: ^static/app\.js$|^backend/html_ui\.py$
        stages: [commit]
        always_run: false
        pass_filenames: false

  - repo: local
    hooks:
      - id: pyright-check
        name: Pyright / Pylance type checking
        entry: npx pyright --project .
        language: system
        types: [python]
        stages: [commit]
        always_run: true
        pass_filenames: false