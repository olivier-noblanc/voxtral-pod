[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = .

# asyncio configuration to stabilize the suite on Windows
asyncio_mode = auto

# Configuration des logs pour le debug
log_cli = true
log_cli_level = INFO
log_cli_format = %(levelname)-8s %(name)s:%(filename)s:%(lineno)d %(message)s

# Filtres de warnings pour garder une sortie propre
filterwarnings =
    ignore::ResourceWarning
    ignore::DeprecationWarning:httpx.*
    ignore::DeprecationWarning:anyio.*
    ignore::DeprecationWarning:websockets.*
    ignore::DeprecationWarning:uvicorn.protocols.websockets.*
    ignore::DeprecationWarning:torch.jit.*
    ignore::RuntimeWarning:pytest_asyncio.plugin.*
    ignore:The 'anyio' loop scope is deprecated:DeprecationWarning
    ignore:The 'function' scope is deprecated:DeprecationWarning