[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = .

# Configuration de l'environnement de test (DB, variables d'env)
# S'assure que TESTING=1 est présent pour activer les mocks de l'engine ASR
env =
    TESTING=1

# Configuration asyncio pour stabiliser la suite sur Windows
# Mode auto pour la commodité, avec nest_asyncio appliqué dans conftest.py pour l'isolation.
asyncio_mode = auto
asyncio_default_test_loop_scope = function

# Configuration des logs pour le debug
log_cli = true
log_cli_level = INFO
log_cli_format = %(levelname)-8s %(name)s:%(filename)s:%(lineno)d %(message)s

# Filtres de warnings pour garder une sortie propre sur Windows (évite les warnings I/O uvicorn)
filterwarnings =
    ignore::ResourceWarning
    ignore::DeprecationWarning:httpx.*
    ignore::DeprecationWarning:anyio.*
    ignore:The 'anyio' loop scope is deprecated:DeprecationWarning
    ignore:The 'function' scope is deprecated:DeprecationWarning