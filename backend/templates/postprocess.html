<!DOCTYPE html>
<html lang="fr" data-fr-scheme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>{{ title }} - {{ filename }}</title>
    <link rel="stylesheet" href="/static/dsfr.min.css">
    <link rel="stylesheet" href="/static/postprocess.css">
</head>
<body>
    <div class="fr-container fr-py-4w">
        <div class="postprocess-container">
            <a href="/" class="fr-link fr-icon-arrow-left-line fr-link--icon-left fr-mb-2w">Retour à l'accueil</a>
            <h1 class="fr-h1">{{ title }}</h1>
            <div class="fr-grid-row fr-grid-row--middle">
                <p class="fr-text--sm fr-mb-0 fr-mr-2w">Fichier : {{ filename }}</p>
                <a href="/view/{{ request.path_params.client_id }}/{{ filename }}?type=original" class="fr-link fr-icon-eye-line fr-link--icon-left fr-text--sm">
                    Voir la version originale (segments)
                </a>
            </div>
            <div class="fr-mt-4w"></div>

            <div class="actions-bar fr-mb-4w">
                <button id="copyBtn" class="fr-btn fr-btn--secondary fr-btn--icon-left fr-icon-clipboard-line">
                    Copier le texte
                </button>
                <button id="downloadBtn" class="fr-btn fr-btn--secondary fr-btn--icon-left fr-icon-download-line" 
                        data-title="{{ title }}" data-filename="{{ filename }}">
                    Télécharger (.txt)
                </button>
            </div>

            <div id="content" class="content-area fr-text--md" data-content="{{ raw_content }}">
                {{ rendered_content | safe }}
            </div>
        </div>
    </div>
    
    <script src="/static/postprocess.js"></script>
</body>
</html>
