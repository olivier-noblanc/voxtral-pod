<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Voxtral – Transcription Audio</title>
    <link rel="stylesheet" href="/static/dsfr.min.css">
    <link rel="stylesheet" href="/static/custom.css">
    <script src="/static/view.js" defer></script>
    <script src="/static/app.js" defer></script>
</head>
<body>
    <header>
        <h1>Voxtral</h1>
        <div id="currentModelDisplay">Modèle actuel : {{ model_name }} ({{ device }})</div>
        <span id="modelLabel">Modèle:</span>
        <span id="modelLabelBroken">Modle:</span>
        <div id="gpuStatus">GPU: {{ device }}</div>
        <div id="commit">Commit : {{ commit }}</div>
    </header>

    <section id="controls">
        <button id="recordBtn">Enregistrement</button>
        <button id="systemBtn">Système</button>
        <button id="meetingBtn">Réunion</button>
        <input type="file" id="audioFile" accept="audio/*">
        <button id="uploadBtn">Uploader</button>

        <label for="modelSelector">Modèle :</label>
        <select id="modelSelector" name="model">
            {{ model_options | safe }}
        </select>

        <select id="audioDeviceSelect"></select>
        <button id="toggleSpeakerEditorBtn">Éditer locuteurs</button>
    </section>

    <section id="liveTranscript">
        <h2>Transcription en direct</h2>
        <div id="audioBarCont">
            <div id="audioBar"></div>
        </div>
    </section>

    <section id="batchStatus">
        <h2>Transcription par lot</h2>
        <div id="uploadProgressContainer">
            <div id="uploadProgressFill"></div>
        </div>
        <div id="batchResult"></div>
    </section>

    <section id="transcriptionList">
        <h2>Historique des transcriptions</h2>
        <ul></ul>
    </section>

    <section id="speakerRenameContainer" style="display:none;">
        <h3>Renommer les locuteurs</h3>
        <ul id="speakerRenameList"></ul>
    </section>

    <div id="albertOptions" style="display:none;">
        <label><input type="checkbox" id="albertPartial"> Utiliser Albert partiel</label>
    </div>

    <div id="cpuWarning" style="display:none;">
        <p>Avertissement : le modèle CPU est utilisé.</p>
    </div>

    <footer>
        <p>&copy; Voxtral – 2026</p>
    </footer>
    <div id="fallbackNotice" style="display:none;"></div>
    <span id="albertQuotaBadge" style="display:none;"></span>
    <span id="fallbackTimer" style="display:none;"></span>
    <div id="albertRateLimitAlert" style="display:none;"></div>
</body>
</html>
